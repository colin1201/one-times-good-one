<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f0eee9"/>
  <!-- Subtle decorative circle -->
  <circle cx="600" cy="280" r="60" fill="none" stroke="#4a6cf7" stroke-width="3" opacity="0.3"/>
  <text x="600" y="270" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="bold" fill="#1a1a1a">One Times Good One</text>
  <!-- Divider line -->
  <line x1="500" y1="300" x2="700" y2="300" stroke="#4a6cf7" stroke-width="2" opacity="0.5"/>
  <text x="600" y="350" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#1a1a1a" opacity="0.7">5 personality tests. 1 quiz. 10 minutes.</text>
</svg>
